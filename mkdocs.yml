site_name: Bedrock Health Group Governance & Compliance Policy Library
site_description: Controlled governance and compliance policy library for Bedrock Health Group

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Policy Library:
      - Policy Index: policy-index.md
      - Compliance Program: compliance-program/index.md
      - Healthcare Compliance: healthcare-compliance/index.md
      - Finance & Administration: finance-administration/index.md
      - Human Resources: human-resources/index.md
      - Vendor Management: vendor-management/index.md
      - Training & Acknowledgements: training-acknowledgements/index.md
  - Governance:
      - Overview: governance/index.md
      - Conflict of Interest Policy: governance/conflict-of-interest-policy.md
  - Privacy & Security:
      - Overview: privacy-security/index.md
      - Privacy Policy: privacy-security/privacy-policy.md
      - Cookies Policy: privacy-security/cookies-policy.md
      - Email Security and Phishing Response Policy: privacy-security/email-security-and-phishing-response-policy.md
  - Operations:
      - Overview: operations/index.md

extra_css:
  - assets/custom.css

extra:
  generator: false
  homepage: https://www.bedrockhealthgroup.org

